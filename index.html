<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masonry E-commerce</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #c5b673;
}

/* ===== MASONRY GRID ===== */
.gallery {
  column-count: 3;
  column-gap: 15px;
  padding: 20px;
}

.gallery img {
  transform: scale(0.9); /* reduces visible size */
}

@media (max-width: 1000px) {
  .gallery { column-count: 3; }
}
@media (max-width: 600px) {
  .gallery { column-count: 2; }
}

.item {
  break-inside: avoid;
  margin-bottom: 15px;
  background: #351e04;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
  cursor: pointer;
}

.item img {
  width: 100%;
  display: block;
  transition: transform 0.3s ease;
}

.item:hover img {
  transform: scale(1.05);
}

/* Overlay */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 10px;
  transform: translateY(100%);
  transition: 0.3s;
  text-align: center;
}

.item:hover .overlay {
  transform: translateY(0);
}

.price {
  font-weight: bold;
  color: #4CAF50;
}

/* ===== LIGHTBOX ===== */
.lightbox {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 999;
}

.lightbox img {
  max-width: 90%;
  max-height: 85%;
  transition: transform 0.3s ease;
  cursor: zoom-in;
}

/* Close */
.close {
  position: absolute;
  top: 20px;
  right: 30px;
  color: white;
  font-size: 30px;
  cursor: pointer;
}

/* Navigation */
.nav {
  position: absolute;
  top: 50%;
  font-size: 30px;
  color: white;
  cursor: pointer;
  user-select: none;
}

.prev { left: 20px; }
.next { right: 20px; }

/* Banner styling */
.top-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: #000;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  font-size: 18px;
  font-weight: bold;
  
}
.top-header {
  background-image: url("https://images.unsplash.com/photo-1567016526105-22da7c13dfb0?q=80&w=1200");
  background-size: cover;
  background-position: center;

  color: white;
  border-bottom: 6px solid #2b1a12;
}
/* Prevent content from hiding behind banner */
body {
  padding-top: 70px;
}

</style>
</head>

<body>
<div class="top-banner">
  <h2>🛍️ Mega Sale - Up to 50% Off!</h2>
</div>
<div class="gallery">

  <!-- Repeat items -->
  <div class="item">
    <img src="images/4.jpg" alt="Product 1">
    <div class="overlay">
      Product 1 <br>
      <span class="price">₹999</span>
    </div>
  </div>

  <div class="item">
    <img src="images/5.jpg" alt="Product 2">
    <div class="overlay">
      Product 2 <br>
      <span class="price">₹1299</span>
    </div>
  </div>

  <div class="item">
    <img src="images/9.jpg" alt="Product 3">
    <div class="overlay">
      Product 3 <br>
      <span class="price">₹799</span>
    </div>
  </div>

  <!-- Add more items same way -->

    <!-- Repeat items -->
  <div class="item">
    <img src="images/1.jpg" alt="Product 1">
    <div class="overlay">
      Product 1 <br>
      <span class="price">₹999</span>
    </div>
  </div>

  <div class="item">
    <img src="images/3.jpg" alt="Product 2">
    <div class="overlay">
      Product 2 <br>
      <span class="price">₹1299</span>
    </div>
  </div>

  <div class="item">
    <img src="images/2.jpg" alt="Product 3">
    <div class="overlay">
      Product 3 <br>
      <span class="price">₹799</span>
    </div>
  </div>

</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="close">&times;</span>
  <span class="nav prev">&#10094;</span>
  <img id="lightbox-img">
  <span class="nav next">&#10095;</span>
</div>

<script>
const images = document.querySelectorAll(".gallery img");
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let currentIndex = 0;
let isZoomed = false;

/* OPEN */
images.forEach((img, index) => {
  img.addEventListener("click", () => {
    currentIndex = index;
    showImage();
    lightbox.style.display = "flex";

    // open zoomed
    enableZoom();
  });
});

function showImage() {
  lightboxImg.src = images[currentIndex].src;
}

/* CLOSE */
document.querySelector(".close").onclick = () => {
  lightbox.style.display = "none";
  resetZoom();
};

/* OUTSIDE CLICK */
lightbox.addEventListener("click", (e) => {
  if (e.target === lightbox) {
    lightbox.style.display = "none";
    resetZoom();
  }
});

/* NAVIGATION */
document.querySelector(".next").onclick = () => {
  currentIndex = (currentIndex + 1) % images.length;
  showImage();
  enableZoom();
};

document.querySelector(".prev").onclick = () => {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  showImage();
  enableZoom();
};

/* ZOOM */
function enableZoom() {
  isZoomed = true;
  lightboxImg.style.transform = "scale(1)";
  lightboxImg.style.cursor = "zoom-out";
}

function resetZoom() {
  isZoomed = false;
  lightboxImg.style.transform = "scale(1)";
  lightboxImg.style.cursor = "zoom-in";
}

/* CLICK TO TOGGLE ZOOM */
lightboxImg.addEventListener("click", (e) => {
  e.stopPropagation();

  if (isZoomed) {
    resetZoom();
  } else {
    enableZoom();
  }
});

/* KEYBOARD */
document.addEventListener("keydown", (e) => {
  if (lightbox.style.display === "flex") {
    if (e.key === "ArrowRight") document.querySelector(".next").click();
    if (e.key === "ArrowLeft") document.querySelector(".prev").click();
    if (e.key === "Escape") document.querySelector(".close").click();
  }
});
</script>

</body>
</html>
